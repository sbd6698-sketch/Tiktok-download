<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>🔥 TikTok 📹 ভিডিও · 🖼️ স্লাইডশো ডাউনলোডার | ভিআইপি সাকিব</title>
  <!-- Font Awesome 6 for crisp social icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0b0b0f 0%, #1a1a24 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      margin: 0;
      color: #f0f0f0;
    }

    .glass-container {
      width: 100%;
      max-width: 680px;
      background: rgba(22, 22, 30, 0.8);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      background: linear-gradient(135deg, rgba(30, 30, 40, 0.85) 0%, rgba(18, 18, 26, 0.9) 100%);
      border-radius: 40px;
      padding: 26px 22px 28px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 0, 80, 0.15);
      transition: all 0.2s ease;
    }

    h2 {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(to right, #ff0050, #ff4d7a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
      filter: drop-shadow(0 4px 6px black);
    }

    .subtitle {
      text-align: center;
      font-size: 0.8rem;
      color: #b0b0c0;
      margin-bottom: 20px;
      background: rgba(255, 255, 255, 0.03);
      padding: 8px 16px;
      border-radius: 40px;
      display: inline-block;
      width: auto;
      margin-left: auto;
      margin-right: auto;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .input-group {
      position: relative;
      margin: 16px 0 10px;
    }

    .input-group input {
      width: 100%;
      padding: 16px 55px 16px 22px;
      background: rgba(10, 10, 15, 0.7);
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255, 0, 80, 0.3);
      border-radius: 50px;
      font-size: 1rem;
      color: #fff;
      outline: none;
      transition: 0.3s;
      letter-spacing: 0.3px;
      font-weight: 400;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.4);
    }

    .input-group input:focus {
      border-color: #ff0050;
      box-shadow: 0 0 20px rgba(255, 0, 80, 0.5);
      background: rgba(20, 20, 28, 0.9);
    }

    .clear-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: #ff0050;
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      font-size: 1.2rem;
      font-weight: bold;
      transition: 0.2s;
      box-shadow: 0 0 14px #ff0050aa;
      backdrop-filter: blur(4px);
    }

    .clear-btn:hover {
      background: #ff1e6a;
      transform: translateY(-50%) scale(1.07);
    }

    .dev-badge {
      text-align: center;
      margin: 8px 0 16px;
      font-size: 0.75rem;
      font-weight: 600;
      background: linear-gradient(90deg, #00f2ea, #7b61ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.8px;
    }

    .social-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 14px 0 8px;
      flex-wrap: wrap;
    }

    .social-btn {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 40px;
      padding: 10px 22px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #f0f0f0;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.25s;
      text-decoration: none;
      box-shadow: 0 6px 14px rgba(0,0,0,0.4);
    }

    .social-btn i {
      font-size: 1.3rem;
    }

    .facebook-btn {
      background: rgba(24, 119, 242, 0.2);
      border-color: #1877f2;
      color: #d0e2ff;
    }

    .facebook-btn:hover {
      background: #1877f2;
      color: white;
      box-shadow: 0 0 22px #1877f2;
      transform: translateY(-2px);
    }

    .instagram-btn {
      background: rgba(225, 48, 108, 0.2);
      border-color: #e1306c;
      color: #fbc2d5;
    }

    .instagram-btn:hover {
      background: #e1306c;
      color: white;
      box-shadow: 0 0 22px #e1306c;
      transform: translateY(-2px);
    }

    .stats-panel {
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(16px);
      border-radius: 28px;
      padding: 18px 16px;
      margin: 20px 0 10px;
      display: none;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
      font-size: 0.95rem;
    }

    .stat-row strong {
      color: #00f2ea;
      min-width: 80px;
    }

    .hashtag-area {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 20px;
      padding: 12px;
      margin-top: 8px;
      border-left: 4px solid #ff0050;
    }

    .hashtags-flex {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .tag {
      background: #2d2d3a;
      padding: 6px 16px;
      border-radius: 30px;
      font-size: 0.8rem;
      color: #00f2ea;
      cursor: pointer;
      border: 1px solid #4a4a5a;
      transition: 0.2s;
    }

    .tag:hover {
      background: #ff0050;
      color: white;
      border-color: #ff0050;
    }

    video {
      width: 100%;
      border-radius: 24px;
      margin-top: 18px;
      background: #000;
      max-height: 450px;
      object-fit: contain;
      box-shadow: 0 12px 28px black;
    }

    .download-row {
      display: flex;
      gap: 12px;
      margin: 18px 0 6px;
      flex-wrap: wrap;
    }

    .btn-download {
      flex: 1;
      text-align: center;
      padding: 14px 10px;
      border-radius: 50px;
      font-weight: 700;
      text-decoration: none;
      color: white;
      transition: 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      backdrop-filter: blur(8px);
    }

    .video-btn {
      background: #00c853;
      box-shadow: 0 6px 18px #00c85360;
    }

    .audio-btn {
      background: #2979ff;
      box-shadow: 0 6px 18px #2979ff60;
    }

    .gallery-section {
      background: rgba(20, 20, 28, 0.8);
      border-radius: 24px;
      padding: 16px;
      margin-top: 18px;
      display: none;
      backdrop-filter: blur(20px);
    }

    .gallery-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .zip-btn {
      background: linear-gradient(135deg, #ff6d00, #ff0050);
      border: none;
      padding: 10px 22px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
      gap: 12px;
      margin-top: 14px;
      max-height: 300px;
      overflow-y: auto;
    }

    .grid-item img {
      width: 100%;
      aspect-ratio: 1/1;
      object-fit: cover;
      border-radius: 16px;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e1e2a;
      color: #00f2ea;
      padding: 8px 24px;
      border-radius: 40px;
      font-weight: 500;
      backdrop-filter: blur(18px);
      border: 1px solid #ff0050;
      opacity: 0;
      transition: 0.2s;
      z-index: 999;
    }
  </style>
</head>
<body>
<div class="glass-container">
  <h2>
    <i class="fab fa-tiktok" style="color:#ff0050; background: white; border-radius: 12px; padding: 4px;"></i> 
    টিকটক ডাউনলোডার
  </h2>
  <div class="subtitle">📹 ভিডিও · 🖼️ স্লাইডশো · 🎵 অডিও · #হ্যাশট্যাগ</div>

  <!-- 🌐 Social Media Buttons -->
  <div class="social-buttons">
    <a href="https://www.facebook.com/share/1BUWm2A7oK/" target="_blank" class="social-btn facebook-btn" rel="noopener">
      <i class="fab fa-facebook-f"></i> Facebook
    </a>
    <a href="https://www.instagram.com/sakib123a21?igsh=NmtuaG5qeXl6eWJw" target="_blank" class="social-btn instagram-btn" rel="noopener">
      <i class="fab fa-instagram"></i> Instagram
    </a>
  </div>

  <div class="input-group">
    <input type="text" id="tiktokUrl" placeholder="TikTok লিংক পেস্ট করুন..." autocomplete="off" spellcheck="false">
    <button class="clear-btn" id="clearInputBtn"><i class="fas fa-times"></i></button>
  </div>
  <div class="dev-badge">⚡ 𝘿𝙀𝙑 𝙑𝙄𝙋 𝙎𝙖𝙠𝙞𝙗 2.2 🔥</div>

  <div id="loadingMessage" style="display:none; text-align:center; color:#00f2ea;">⏳ তথ্য আনা হচ্ছে...</div>

  <div class="stats-panel" id="statsPanel">
    <div class="stat-row"><strong>👁 ভিউ</strong> <span id="viewCount">-</span></div>
    <div class="stat-row"><strong>❤️ লাইক</strong> <span id="likeCount">-</span></div>
    <div class="stat-row"><strong>💬 কমেন্ট</strong> <span id="commentCount">-</span></div>
    <div class="stat-row"><strong>✍️ ক্রিয়েটর</strong> <span id="authorName" style="cursor:pointer;">-</span></div>
    <div class="hashtag-area" id="hashtagBox" style="display: none;">
      <div class="hashtags-flex" id="hashtagList"></div>
    </div>
  </div>

  <video id="videoPlayer" controls style="display: none;"></video>

  <div class="download-row" id="downloadButtons" style="display: none;">
    <a id="videoDownloadLink" class="btn-download video-btn" download><i class="fas fa-download"></i> ভিডিও HD</a>
    <a id="audioDownloadLink" class="btn-download audio-btn" download><i class="fas fa-headphones"></i> অডিও MP3</a>
  </div>

  <div class="gallery-section" id="galleryPanel">
    <div class="gallery-header">
      <span style="font-weight: bold; color:#ffaa00;">📸 ছবি স্লাইডশো</span>
      <button id="downloadZipBtn" class="zip-btn"><i class="fas fa-file-archive"></i> সব একসাথে (ZIP)</button>
    </div>
    <div class="grid" id="imageGrid"></div>
  </div>
</div>

<div id="liveToast" class="toast">✅ কপি হয়েছে!</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
  (function() {
    const urlInput = document.getElementById('tiktokUrl');
    const clearBtn = document.getElementById('clearInputBtn');
    const loadingDiv = document.getElementById('loadingMessage');
    const statsPanel = document.getElementById('statsPanel');
    const videoPlayer = document.getElementById('videoPlayer');
    const downloadBtns = document.getElementById('downloadButtons');
    const galleryPanel = document.getElementById('galleryPanel');
    const imageGrid = document.getElementById('imageGrid');
    const toast = document.getElementById('liveToast');
    
    let abortController = null;
    let lastProcessedUrl = '';

    function showToast(text) {
      toast.textContent = text || '✅ সম্পন্ন';
      toast.style.opacity = '1';
      setTimeout(() => { toast.style.opacity = '0'; }, 2200);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast('📋 কপি: ' + (text.length > 22 ? text.substring(0,22)+'…' : text));
      } catch {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('📋 কপি হয়েছে');
      }
    }

    function resetUI() {
      statsPanel.style.display = 'none';
      downloadBtns.style.display = 'none';
      galleryPanel.style.display = 'none';
      videoPlayer.style.display = 'none';
      videoPlayer.src = '';
      imageGrid.innerHTML = '';
      if (abortController) abortController.abort();
    }

    function extractHashtags(data) {
      let tags = [];
      if (data.challenges && Array.isArray(data.challenges)) {
        tags = data.challenges.map(c => c.title).filter(Boolean);
      }
      if (tags.length === 0 && (data.title || data.desc)) {
        const text = data.title || data.desc || "";
        const regex = /#(\w+)/g;
        let m;
        while ((m = regex.exec(text)) !== null) tags.push(m[1]);
      }
      return [...new Set(tags)];
    }

    function renderHashtags(tags) {
      const box = document.getElementById('hashtagBox');
      const list = document.getElementById('hashtagList');
      if (!tags.length) { box.style.display = 'none'; return; }
      box.style.display = 'block';
      list.innerHTML = '';
      tags.forEach(tag => {
        const chip = document.createElement('span');
        chip.className = 'tag';
        chip.innerHTML = `#${tag} <i class="fas fa-copy" style="font-size:0.7rem;"></i>`;
        chip.onclick = (e) => { e.stopPropagation(); copyText(`#${tag}`); };
        list.appendChild(chip);
      });
    }

    function displayGallery(imagesArray) {
      if (!imagesArray || imagesArray.length === 0) {
        galleryPanel.style.display = 'none';
        return;
      }
      galleryPanel.style.display = 'block';
      imageGrid.innerHTML = '';
      imagesArray.forEach((imgUrl, idx) => {
        const item = document.createElement('div');
        item.className = 'grid-item';
        const img = document.createElement('img');
        img.src = imgUrl;
        img.alt = `slide ${idx+1}`;
        img.title = 'ক্লিক করে ডাউনলোড';
        img.onclick = () => {
          const a = document.createElement('a');
          a.href = imgUrl;
          a.download = `tiktok_img_${Date.now()}_${idx+1}.jpg`;
          a.click();
          showToast(`ছবি ${idx+1} ডাউনলোড`);
        };
        item.appendChild(img);
        imageGrid.appendChild(item);
      });

      const zipBtn = document.getElementById('downloadZipBtn');
      const newZipBtn = zipBtn.cloneNode(true);
      zipBtn.parentNode.replaceChild(newZipBtn, zipBtn);
      newZipBtn.addEventListener('click', async () => {
        showToast('📦 প্যাকেজ তৈরি হচ্ছে...');
        try {
          const zip = new JSZip();
          const folder = zip.folder("tiktok_slides");
          const promises = imagesArray.map(async (url, i) => {
            const res = await fetch(url);
            const blob = await res.blob();
            folder.file(`slide_${i+1}.jpg`, blob, { binary: true });
          });
          await Promise.all(promises);
          const content = await zip.generateAsync({ type: "blob" });
          const link = document.createElement('a');
          link.href = URL.createObjectURL(content);
          link.download = `tiktok_slides_${Date.now()}.zip`;
          link.click();
          showToast('✅ ZIP ডাউনলোড শুরু');
        } catch (e) {
          showToast('❌ প্যাকিং ব্যর্থ');
        }
      });
    }

    async function fetchTikTokData(url) {
      const trimmed = url.trim();
      if (!trimmed) { resetUI(); return; }
      if (trimmed === lastProcessedUrl) return;
      lastProcessedUrl = trimmed;
      resetUI();
      loadingDiv.style.display = 'block';

      if (abortController) abortController.abort();
      abortController = new AbortController();
      const signal = abortController.signal;

      try {
        const apiUrl = `https://www.tikwm.com/api/?url=${encodeURIComponent(trimmed)}`;
        const response = await fetch(apiUrl, { signal });
        const result = await response.json();
        if (!result || !result.data) throw new Error('কোন ডেটা নেই');
        
        const d = result.data;
        document.getElementById('viewCount').innerText = (d.play_count ?? d.views ?? 0).toLocaleString();
        document.getElementById('likeCount').innerText = (d.digg_count ?? d.likes ?? 0).toLocaleString();
        document.getElementById('commentCount').innerText = (d.comment_count ?? d.comments ?? 0).toLocaleString();
        const author = d.author?.nickname || d.author?.unique_id || 'টিকটকার';
        document.getElementById('authorName').innerText = author;
        document.getElementById('authorName').onclick = () => copyText(`@${d.author?.unique_id || author}`);
        
        const hashtags = extractHashtags(d);
        renderHashtags(hashtags);
        statsPanel.style.display = 'block';

        let images = [];
        if (d.images && Array.isArray(d.images)) images = d.images.filter(u => u && u.startsWith('http'));
        if (!images.length && d.image_list) images = d.image_list.filter(u => u);
        
        const videoUrl = d.play || d.video_url || null;
        const musicUrl = d.music || d.audio_url || null;
        const isSlide = images.length > 0;

        if (isSlide) {
          videoPlayer.style.display = 'none';
          videoPlayer.src = '';
          displayGallery(images);
        } else {
          galleryPanel.style.display = 'none';
          if (videoUrl) {
            videoPlayer.style.display = 'block';
            videoPlayer.src = videoUrl;
            videoPlayer.load();
          } else {
            videoPlayer.style.display = 'none';
          }
        }

        downloadBtns.style.display = 'flex';
        const vidBtn = document.getElementById('videoDownloadLink');
        const audBtn = document.getElementById('audioDownloadLink');

        if (videoUrl && !isSlide) {
          vidBtn.href = videoUrl;
          vidBtn.download = `tiktok_video_${Date.now()}.mp4`;
          vidBtn.style.opacity = '1';
          vidBtn.onclick = null;
        } else {
          vidBtn.href = '#';
          vidBtn.style.opacity = '0.6';
          vidBtn.onclick = (e) => { e.preventDefault(); showToast('ভিডিও নেই'); };
        }

        if (musicUrl) {
          audBtn.href = musicUrl;
          audBtn.download = `tiktok_audio_${Date.now()}.mp3`;
          audBtn.style.opacity = '1';
          audBtn.onclick = null;
        } else {
          audBtn.href = '#';
          audBtn.style.opacity = '0.6';
          audBtn.onclick = (e) => { e.preventDefault(); showToast('অডিও নেই'); };
        }

      } catch (err) {
        if (err.name === 'AbortError') return;
        statsPanel.style.display = 'block';
        document.getElementById('viewCount').innerText = 'ত্রুটি';
        showToast('⚠️ লিংক চেক করুন');
      } finally {
        loadingDiv.style.display = 'none';
        abortController = null;
      }
    }

    let debounceTimer;
    urlInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      const val = urlInput.value.trim();
      if (val === '') { resetUI(); lastProcessedUrl = ''; return; }
      debounceTimer = setTimeout(() => fetchTikTokData(val), 550);
    });

    urlInput.addEventListener('paste', () => {
      setTimeout(() => {
        const val = urlInput.value.trim();
        if (val) fetchTikTokData(val);
      }, 30);
    });

    clearBtn.addEventListener('click', () => {
      urlInput.value = '';
      resetUI();
      lastProcessedUrl = '';
      if (abortController) abortController.abort();
      loadingDiv.style.display = 'none';
      showToast('পরিষ্কার');
    });

    window.addEventListener('load', () => {
      if (urlInput.value.trim()) fetchTikTokData(urlInput.value);
    });
  })();
</script>
</body>
</html>
